name: Otomatik Test (derle + duman testi)

on:
  push:
    branches: ["**"]
    paths:
      - "index.html"
      - "build/**"
      - ".github/workflows/test.yml"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Derle veya kopyala (kaynak dal → derle, main → zaten derli)
        run: |
          if grep -q '<script type="text/babel">' index.html; then
            echo "Kaynak index.html → derleniyor"
            cd build
            npm install @babel/core @babel/preset-react --no-save
            node derle.js "$GITHUB_WORKSPACE/build/compiled.html"
          else
            echo "index.html zaten derli (main) → doğrudan test edilecek"
            cp index.html build/compiled.html
          fi

      - name: Playwright + Chromium
        run: npm install playwright && npx playwright install --with-deps chromium

      - name: Duman testi (JS hatası + render kontrolü)
        run: node build/smoke.mjs build/compiled.html

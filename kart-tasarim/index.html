<title>ForzaLig · Card Design Language — V2 · 5 Concepts</title>
<style>
/* =====================================================================
   ForzaLig — CARD DESIGN LANGUAGE · V2
   Tek dosya · Vanilla · Framework/CDN yok
   --------------------------------------------------------------------
   FELSEFE: 5 konsept BİRBİRİNİN RENGİ DEĞİL — her biri kendi
   geometrisi / silüeti / layout'u / tipografisi / ışığı ile ayrı bir kart.
   - Ortak: flip · hover · 3D tilt · parallax · rarity · theme engine.
   - Rarity = SADECE vurgu (--a,--b,--g) → geometri/kimlik konsepte ait.
   ===================================================================== */

/* ---------- RESET & GLOBAL ---------- */
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; }
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,Arial,sans-serif;
  background:radial-gradient(130% 120% at 50% -10%,#0c111e,#06080f 50%,#030509);
  color:#eef2fb; min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased;
}
:root{
  --ease:cubic-bezier(.22,.61,.36,1);
  --a:#f5d67b;               /* rarity vurgu 1 */
  --b:#c9a24a;               /* rarity vurgu 2 */
  --g:rgba(245,214,123,.42); /* rarity glow */
}

/* ---------- TOPBAR / SEKMELER ---------- */
.topbar{
  position:sticky; top:0; z-index:60;
  display:flex; flex-wrap:wrap; gap:10px 12px; align-items:center; justify-content:center;
  padding:13px 16px calc(13px + env(safe-area-inset-top,0));
  background:linear-gradient(180deg,rgba(3,5,9,.94),rgba(3,5,9,.4) 75%,transparent);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
}
.brand{ display:flex; align-items:center; gap:9px; }
.brand svg{ width:24px; height:24px; }
.brand b{ font-size:15px; font-weight:800; letter-spacing:.4px; }
.brand b i{ color:var(--b); font-style:normal; }
.tabs{ display:flex; flex-wrap:wrap; gap:7px; justify-content:center; }
.tab{
  cursor:pointer; color:#aab4c8; background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.09); padding:9px 14px; border-radius:12px;
  font-size:12px; font-weight:700; letter-spacing:.2px; transition:all .28s var(--ease); white-space:nowrap;
}
.tab:hover{ color:#fff; transform:translateY(-1px); background:rgba(255,255,255,.09); }
.tab.active{ color:#05070c; background:linear-gradient(135deg,var(--a),var(--b)); border-color:transparent; box-shadow:0 8px 24px rgba(0,0,0,.45); }
.rar-wrap{ display:flex; align-items:center; gap:8px; }
.rar-wrap label{ font-size:11px; color:#aab4c8; font-weight:700; letter-spacing:.4px; }
.rar-wrap select{
  background:rgba(255,255,255,.06); color:#eef2fb; border:1px solid rgba(255,255,255,.14);
  border-radius:11px; padding:8px 10px; font-size:12px; font-weight:700; font-family:inherit; outline:none; cursor:pointer;
}
.subhint{ width:100%; text-align:center; font-size:11px; color:#8a93a6; opacity:.8; }

/* ---------- SAHNE ---------- */
.stage{
  min-height:calc(100vh - 100px); display:grid; place-items:center;
  padding:44px 16px 74px; perspective:1700px; perspective-origin:50% 42%;
}
.concept-label{ position:absolute; top:100px; left:50%; transform:translateX(-50%); text-align:center; pointer-events:none; z-index:2; }
.concept-label .n{ font-size:11px; letter-spacing:4px; color:var(--b); font-weight:800; }
.concept-label .d{ font-size:12px; color:#8a93a6; letter-spacing:1px; margin-top:3px; }

/* ---------- ORTAK KART İSKELETİ (flip + tilt) ---------- */
.floater{ animation:float 6.5s ease-in-out infinite; will-change:transform; }
@keyframes float{ 0%,100%{ transform:translateY(-7px);} 50%{ transform:translateY(9px);} }
.card{
  position:relative; transform-style:preserve-3d; cursor:pointer; user-select:none;
  transform:rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg));
  transition:transform .16s var(--ease); will-change:transform;
}
.card__inner{ position:absolute; inset:0; transform-style:preserve-3d; transition:transform .95s var(--ease); will-change:transform; }
.card.is-flipped .card__inner{ transform:rotateY(180deg); }
.face{ position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; overflow:hidden; }
.face.back{ transform:rotateY(180deg); }
.card::after{ /* rarity glow */
  content:""; position:absolute; inset:-8%; z-index:-1; border-radius:44px;
  background:radial-gradient(58% 58% at 50% 45%,var(--a),transparent 70%);
  opacity:.28; filter:blur(34px); transition:opacity .4s var(--ease);
}
.card:hover::after{ opacity:.46; }
.sweep{ position:absolute; inset:0; z-index:20; pointer-events:none; opacity:0;
  background:linear-gradient(115deg,transparent 34%,rgba(255,255,255,.55) 50%,transparent 66%);
  transform:translateX(-120%); mix-blend-mode:overlay; }
.card:hover .sweep{ animation:sweep 1.15s var(--ease); }
@keyframes sweep{ 0%{opacity:0;transform:translateX(-120%);} 30%{opacity:.9;} 100%{opacity:0;transform:translateX(120%);} }
.dust{ position:absolute; width:3px; height:3px; border-radius:50%; background:rgba(255,255,255,.7); filter:blur(.3px); animation:rise linear infinite; opacity:0; }
@keyframes rise{ 0%{transform:translateY(16px) scale(.6);opacity:0;} 15%{opacity:.7;} 85%{opacity:.4;} 100%{transform:translateY(-360px) scale(1);opacity:0;} }
.flip-tip{ position:absolute; bottom:16px; left:50%; transform:translateX(-50%); z-index:6; font-size:9.5px; letter-spacing:1px; color:#8a93a6; opacity:.6; pointer-events:none; }

/* Ortak küçük öğeler */
.holo{ border-radius:50%; background:conic-gradient(from 0deg,#ff2d55,#ffcc00,#34c759,#00c7ff,#af52de,#ff2d55);
  filter:saturate(1.4) brightness(1.1); box-shadow:0 0 10px rgba(255,255,255,.35),inset 0 0 8px rgba(255,255,255,.4); animation:holoSpin 6s linear infinite; }
.holo::after{ content:""; position:absolute; inset:24%; border-radius:50%; background:rgba(5,8,14,.85); }
@keyframes holoSpin{ to{ transform:rotate(360deg);} }
.qrbox{ background:#fff; border-radius:8px; padding:5px; }
.qrbox canvas{ display:block; width:100%; height:100%; image-rendering:pixelated; }

/* =====================================================================
   CONCEPT 1 · APPLE / VISIONOS / GLASS / MINIMAL
   Geometri: uzun, çok yumuşak yuvarlak panel. Ferah. Katmanlı cam.
   ===================================================================== */
.c1 .card{ width:330px; height:510px; }
.c1 .face{ border-radius:38px;
  background:linear-gradient(165deg,#eef3fb,#dbe6f5 55%,#cdd9ee);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9), 0 30px 60px rgba(10,20,40,.5); }
.c1 .glass-layer{ position:absolute; inset:14px; border-radius:28px; overflow:hidden;
  background:linear-gradient(160deg,rgba(255,255,255,.55),rgba(255,255,255,.15));
  border:1px solid rgba(255,255,255,.7); backdrop-filter:blur(4px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9), 0 10px 30px rgba(30,50,90,.2); }
.c1 .c1-top{ position:absolute; top:26px; left:26px; right:26px; display:flex; align-items:center; justify-content:space-between; z-index:5; }
.c1 .c1-ovr{ display:flex; align-items:baseline; gap:6px; color:#1b2434; }
.c1 .c1-ovr .n{ font-size:34px; font-weight:800; letter-spacing:-1.5px; }

.c1 .c1-brand{ display:flex; align-items:center; gap:6px; color:#33415a; font-size:12px; font-weight:800; }
.c1 .c1-brand svg{ width:18px; height:18px; }
.c1 .c1-photo{ position:absolute; top:66px; left:0; right:0; display:grid; place-items:center; z-index:3; }

.c1 .c1-flag{ position:absolute; top:70px; right:30px; width:30px; height:22px; border-radius:5px; overflow:hidden; z-index:6; box-shadow:0 3px 8px rgba(0,0,0,.25); }
.c1 .c1-flag svg{ width:100%; height:100%; }
.c1 .c1-lower{ position:absolute; left:22px; right:22px; bottom:22px; z-index:5;
  background:rgba(255,255,255,.5); border:1px solid rgba(255,255,255,.8); border-radius:24px; padding:16px 16px 14px; backdrop-filter:blur(8px); }
.c1 .c1-name{ text-align:center; font-size:21px; font-weight:800; letter-spacing:.5px; color:#141c2b; }
.c1 .c1-season{ text-align:center; font-size:9.5px; letter-spacing:2px; color:#5a6b86; font-weight:700; margin:2px 0 12px; }
.c1 .c1-stats{ display:flex; justify-content:space-between; gap:4px; }
.c1 .c1-stats .s{ flex:1; text-align:center; background:rgba(255,255,255,.7); border-radius:12px; padding:8px 2px; box-shadow:inset 0 1px 0 #fff; }
.c1 .c1-stats .s .v{ font-size:16px; font-weight:800; color:#1b2434; }
.c1 .c1-stats .s .k{ font-size:8px; font-weight:700; color:#6a7a93; letter-spacing:.5px; }
.c1 .c1-foot{ display:flex; align-items:center; justify-content:space-between; margin-top:12px; padding-top:10px; border-top:1px solid rgba(30,50,90,.12); }
.c1 .c1-foot .rr{ font-size:8px; color:#5a6b86; font-weight:700; } .c1 .c1-foot .rr b{ display:block; font-size:10px; color:var(--b); }
.c1 .c1-foot .holo{ width:26px; height:26px; position:relative; opacity:.85; }
.c1 .c1-foot .id{ font-size:8px; color:#5a6b86; font-weight:700; text-align:right; } .c1 .c1-foot .id b{ display:block; font-size:10px; color:#1b2434; }
/* C1 arka */
.c1 .back{ background:linear-gradient(165deg,#eef3fb,#d3deef); color:#1b2434; padding:30px 26px; }
.c1 .back h3{ text-align:center; font-size:12px; letter-spacing:3px; color:#4b6a9c; font-weight:800; }
.c1 .back .nm{ text-align:center; font-size:20px; font-weight:800; margin-bottom:14px; }
.c1 .back .grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px 16px; margin-bottom:14px; }

.c1 .back .row b{ font-size:14px; font-weight:800; } .c1 .back .row b.h{ color:#2c7; }
.c1 .back .verify{ display:flex; align-items:center; gap:12px; margin-top:auto; background:rgba(255,255,255,.6); border-radius:18px; padding:12px; border:1px solid rgba(255,255,255,.9); }
.c1 .back .verify .qrbox{ width:52px; height:52px; }
.c1 .back .verify .vt b{ font-size:12px; } .c1 .back .verify .vt span{ font-size:9px; color:#5a6b86; display:block; }
.c1 .back .verify .ok{ margin-left:auto; text-align:right; font-size:10px; font-weight:800; color:#1a9e57; }

/* =====================================================================
   CONCEPT 2 · PORSCHE / F1 / CARBON / TITANIUM
   Geometri: geniş, köşeli (chamfer). Asimetrik spec-sheet. Sağ-üst eğik OVR.
   ===================================================================== */
.c2 .card{ width:360px; height:500px; }
.c2 .face{ background:#0b0c0f;
  clip-path:polygon(0 6%,6% 0,100% 0,100% 88%,94% 100%,0 100%);

.c2 .carbon{ position:absolute; inset:0;

                   linear-gradient(45deg,rgba(255,255,255,.045) 25%,transparent 25%,transparent 75%,rgba(255,255,255,.045) 75%);
  background-size:7px 7px; background-position:0 0,3.5px 3.5px; }
.c2 .edge{ position:absolute; inset:0; border:1px solid rgba(255,255,255,.08);
  clip-path:polygon(0 6%,6% 0,100% 0,100% 88%,94% 100%,0 100%); }
.c2 .redline{ position:absolute; top:0; bottom:0; left:52%; width:2px; background:linear-gradient(180deg,transparent,var(--a),transparent); box-shadow:0 0 14px var(--a); opacity:.85; }
.c2 .c2-ovr{ position:absolute; top:22px; right:0; transform:skewX(-12deg); background:linear-gradient(135deg,#e9edf2,#7f858e); color:#0b0c0f; padding:8px 22px 8px 26px; z-index:6; box-shadow:0 6px 18px rgba(0,0,0,.5); }
.c2 .c2-ovr>span{ display:block; transform:skewX(12deg); text-align:center; }
.c2 .c2-ovr .n{ font-size:38px; font-weight:900; font-style:italic; letter-spacing:-1px; line-height:.9; }

.c2 .c2-top svg{ width:18px; height:18px; } .c2 .c2-top b{ font-size:12px; font-weight:800; } .c2 .c2-top b i{ color:var(--a); font-style:normal; }
.c2 .c2-photo{ position:absolute; top:52px; left:-6%; width:66%; height:300px; z-index:3; display:grid; place-items:center; }
.c2 .c2-photo svg{ width:100%; height:100%; filter:drop-shadow(14px 20px 24px rgba(0,0,0,.6)) contrast(1.05); }
.c2 .c2-flag{ position:absolute; top:80px; left:22px; width:28px; height:20px; border-radius:3px; overflow:hidden; z-index:6; }
.c2 .c2-flag svg{ width:100%; height:100%; }
/* sağ telemetri */

.c2 .c2-tele .row{ margin-bottom:11px; }
.c2 .c2-tele .lab{ display:flex; justify-content:space-between; font-size:9px; font-weight:800; letter-spacing:1px; color:#aeb4bd; margin-bottom:3px; font-family:ui-monospace,monospace; }
.c2 .c2-tele .lab b{ color:#fff; }
.c2 .c2-tele .bar{ height:5px; background:rgba(255,255,255,.1); border-radius:3px; overflow:hidden; }
.c2 .c2-tele .bar i{ display:block; height:100%; background:linear-gradient(90deg,var(--b),var(--a)); box-shadow:0 0 10px var(--a); border-radius:3px; transform-origin:left; animation:grow 1s var(--ease) both; }
@keyframes grow{ from{ transform:scaleX(0);} }
.c2 .c2-name{ position:absolute; left:20px; bottom:64px; z-index:6; color:#fff; }
.c2 .c2-name .nm{ font-size:30px; font-weight:900; font-style:italic; letter-spacing:-.5px; text-transform:uppercase; line-height:.95; }
.c2 .c2-name .sea{ font-size:10px; letter-spacing:3px; color:var(--a); font-weight:800; }
.c2 .c2-foot{ position:absolute; left:20px; right:20px; bottom:20px; z-index:6; display:flex; align-items:center; justify-content:space-between; font-family:ui-monospace,monospace; }
.c2 .c2-foot .m{ font-size:8px; color:#8b929c; letter-spacing:1px; } .c2 .c2-foot .m b{ display:block; font-size:11px; color:#fff; }
.c2 .c2-foot .holo{ width:26px; height:26px; position:relative; }
/* C2 arka */
.c2 .back{ background:#0b0c0f; padding:30px 24px; color:#e9edf2; }
.c2 .back .carbon{ opacity:.6; }
.c2 .back h3{ position:relative; font-family:ui-monospace,monospace; font-size:11px; letter-spacing:3px; color:var(--a); font-weight:800; margin-bottom:4px; }
.c2 .back .nm{ position:relative; font-size:22px; font-weight:900; font-style:italic; text-transform:uppercase; margin-bottom:16px; }
.c2 .back .grid{ position:relative; display:grid; grid-template-columns:1fr 1fr; gap:6px 14px; margin-bottom:16px; }

.c2 .back .row b{ font-size:14px; color:#fff; } .c2 .back .row b.h{ color:var(--a); }
.c2 .back .verify{ position:relative; display:flex; align-items:center; gap:12px; margin-top:auto; }
.c2 .back .verify .qrbox{ width:52px; height:52px; }
.c2 .back .verify .vt b{ font-size:12px; } .c2 .back .verify .vt span{ font-size:8px; color:#8b929c; display:block; font-family:ui-monospace,monospace; }

/* =====================================================================
   CONCEPT 3 · NIKE / STADIUM / CHAMPIONS / SPORT
   Geometri: dinamik, büyük diyagonal blok. Dev OVR üstte. Atletik.
   ===================================================================== */
.c3 .card{ width:338px; height:516px; }
.c3 .face{ border-radius:22px; background:linear-gradient(180deg,#0a1420 0%,#0c2718 68%,#0a3a1e 100%);

.c3 .flood{ position:absolute; inset:0; background:
  conic-gradient(from 200deg at 18% -8%,rgba(255,255,255,.16),transparent 22%),

.c3 .c3-brand{ position:absolute; top:22px; right:22px; z-index:6; display:flex; align-items:center; gap:6px; color:#eafff0; font-size:12px; font-weight:900; font-style:italic; }

.c3 .c3-foot .rr{ font-size:8px; color:#9fb3a6; font-weight:700; } .c3 .c3-foot .rr b{ display:block; font-size:11px; color:var(--a); }
.c3 .c3-foot .id{ font-size:8px; color:#9fb3a6; text-align:center; } .c3 .c3-foot .id b{ display:block; font-size:11px; color:#fff; }

/* C3 arka */
.c3 .back{ background:linear-gradient(180deg,#0a1420,#0a3a1e); padding:28px 24px; color:#eafff0; }
.c3 .back .flood{ opacity:.5; }

.c3 .back .row b{ font-size:15px; font-style:italic; color:#fff; } .c3 .back .row b.h{ color:var(--a); }

/* =====================================================================

/* ---- DURUM ---- */
let state = { c:1, r:'gold' };
const stage = document.getElementById('stage');
const mount = document.getElementById('mount');

/* ---- SAHTE QR (deterministik) ---- */
function drawQR(cv){
  const ctx=cv.getContext('2d'); const N=21, px=cv.width/N; ctx.clearRect(0,0,cv.width,cv.height);
  let s=12457; const rnd=()=>{ s=(s*1103515245+12345)&0x7fffffff; return (s>>8)/0x7fffff; };
  ctx.fillStyle='#0a0a0a';
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){ if(rnd()>.55) ctx.fillRect(x*px,y*px,px,px); }
  const f=(ox,oy)=>{ ctx.fillStyle='#0a0a0a'; ctx.fillRect(ox*px,oy*px,7*px,7*px);
    ctx.fillStyle='#fff'; ctx.fillRect((ox+1)*px,(oy+1)*px,5*px,5*px);
    ctx.fillStyle='#0a0a0a'; ctx.fillRect((ox+2)*px,(oy+2)*px,3*px,3*px); };
  f(0,0); f(N-7,0); f(0,N-7);
}

/* ---- PARÇACIK (birkaç toz) ---- */
function particles(card){
  const front=card.querySelector('.front'); if(!front) return;
  for(let i=0;i<8;i++){ const d=document.createElement('div'); d.className='dust';
    d.style.left=(8+Math.random()*84)+'%'; d.style.bottom='0';
    d.style.animationDuration=(6+Math.random()*7)+'s'; d.style.animationDelay=(Math.random()*6)+'s';
    d.style.opacity=String(.25+Math.random()*.4); front.appendChild(d); }
}

/* ---- FLIP + TILT + PARALLAX (yeniden bağlanır) ---- */
function bindCard(){
  const card=mount.querySelector('.card'); if(!card) return;
  // flip (sürükleme değilse)
  let dx=0,dy=0,moved=false;
  card.addEventListener('pointerdown',e=>{ dx=e.clientX; dy=e.clientY; moved=false; });
  card.addEventListener('pointermove',e=>{ if(Math.abs(e.clientX-dx)>6||Math.abs(e.clientY-dy)>6) moved=true; });
  card.addEventListener('click',()=>{ if(!moved) card.classList.toggle('is-flipped'); });
  // tilt + parallax — sadece fare
  if(window.matchMedia('(pointer:fine)').matches){
    const depth=[...card.querySelectorAll('[data-depth]')];
    let raf=null,tx=0,ty=0;
    const apply=()=>{ raf=null; const m=11;
      card.style.setProperty('--ry',(tx*m).toFixed(2)+'deg');
      card.style.setProperty('--rx',(-ty*m).toFixed(2)+'deg');
      depth.forEach(el=>{ const d=parseFloat(el.dataset.depth)||0;
        el.style.transform=`translate3d(${(-tx*d).toFixed(1)}px,${(-ty*d).toFixed(1)}px,0)`; }); };
    card.addEventListener('pointermove',e=>{ const r=card.getBoundingClientRect();
      tx=(e.clientX-r.left)/r.width-.5; ty=(e.clientY-r.top)/r.height-.5; if(!raf) raf=requestAnimationFrame(apply); });
    card.addEventListener('pointerleave',()=>{ card.style.setProperty('--ry','0deg'); card.style.setProperty('--rx','0deg');
      depth.forEach(el=>el.style.transform='translate3d(0,0,0)'); });
  }
  // QR + parçacık
  card.querySelectorAll('canvas.qr').forEach(drawQR);
  particles(card);
}

/* ---- RARITY UYGULA (theme engine) ---- */
function applyRarity(){
  const R=RARITY[state.r];
  stage.style.setProperty('--a',R.a); stage.style.setProperty('--b',R.b); stage.style.setProperty('--g',R.g);
  document.querySelectorAll('.tab.active,.topbar').forEach(()=>{});
  document.documentElement.style.setProperty('--a',R.a);
  document.documentElement.style.setProperty('--b',R.b);
}

/* ---- MOUNT (konsept değişince yeniden kur) ---- */
function build(){
  const R=RARITY[state.r];
  mount.innerHTML=CONCEPTS[state.c].render(R);
  document.getElementById('cN').textContent=CONCEPTS[state.c].n;
  document.getElementById('cD').textContent=CONCEPTS[state.c].d;
  bindCard();
}

/* ---- SEKME + RARITY OLAYLARI ---- */
document.getElementById('tabs').addEventListener('click',e=>{
  const b=e.target.closest('.tab'); if(!b) return; state.c=+b.dataset.c;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t===b));
  build();
});
document.getElementById('rar').addEventListener('change',e=>{ state.r=e.target.value; applyRarity(); build(); });

/* ---- BAŞLAT ---- */
applyRarity(); build();
</script>

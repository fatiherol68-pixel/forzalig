<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ForzaLig · Card Design Language — V3 · Real-Photo Safe</title>
<style>
/* =====================================================================
   ForzaLig — CARD DESIGN LANGUAGE · V3
   Tek dosya · Vanilla · Framework/CDN yok
   --------------------------------------------------------------------
   V3 ODAK: GERÇEK FOTOĞRAF GÜVENLİĞİ
   - Foto = <img object-fit:cover> · yüz üst-merkezde, kapatılmaz.
   - Her fotonun üstünde otomatik scrim (gradient) → yazı her zaman okunur.
   - Yazılar yalnız güvenli (scrim'li) bölgede; yüzle çakışmaz.
   - İsimler fitText ile tek satıra otomatik küçülür (uzun isim bozmaz).
   - Tüm içerik safe-area padding içinde.
   - 10+ oyuncu verisiyle test → taşma/hizalama yok.
   - Rarity = SADECE renk/glow/border/efekt (--a,--b,--g). Layout sabit.
   ===================================================================== */

*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; }
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,Arial,sans-serif;
  background:radial-gradient(130% 120% at 50% -10%,#0c111e,#06080f 50%,#030509);
  color:#eef2fb; min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased;
}
:root{ --ease:cubic-bezier(.22,.61,.36,1); --a:#f5d67b; --b:#c9a24a; --g:rgba(245,214,123,.42); }

/* ---------- TOPBAR ---------- */
.topbar{ position:sticky; top:0; z-index:60; display:flex; flex-wrap:wrap; gap:10px 12px; align-items:center; justify-content:center;
  padding:12px 16px calc(12px + env(safe-area-inset-top,0));
  background:linear-gradient(180deg,rgba(3,5,9,.95),rgba(3,5,9,.4) 78%,transparent);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); }
.brand{ display:flex; align-items:center; gap:8px; } .brand svg{ width:22px; height:22px; }
.brand b{ font-size:14px; font-weight:800; } .brand b i{ color:var(--b); font-style:normal; }
.tabs{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
.tab{ cursor:pointer; color:#aab4c8; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.09);
  padding:8px 13px; border-radius:11px; font-size:11.5px; font-weight:700; transition:all .28s var(--ease); white-space:nowrap; }
.tab:hover{ color:#fff; transform:translateY(-1px); }
.tab.active{ color:#05070c; background:linear-gradient(135deg,var(--a),var(--b)); border-color:transparent; box-shadow:0 8px 24px rgba(0,0,0,.45); }
.ctl{ display:flex; align-items:center; gap:7px; }
.ctl label{ font-size:10.5px; color:#aab4c8; font-weight:700; letter-spacing:.3px; }
.ctl select{ background:rgba(255,255,255,.06); color:#eef2fb; border:1px solid rgba(255,255,255,.14); border-radius:10px;
  padding:7px 9px; font-size:11.5px; font-weight:700; font-family:inherit; outline:none; cursor:pointer; max-width:160px; }
.ctl button{ background:rgba(255,255,255,.06); color:#eef2fb; border:1px solid rgba(255,255,255,.14); border-radius:9px;
  width:30px; height:30px; font-size:14px; cursor:pointer; }
.subhint{ width:100%; text-align:center; font-size:10.5px; color:#8a93a6; opacity:.8; }

/* ---------- SAHNE ---------- */
.stage{ min-height:calc(100vh - 110px); display:grid; place-items:center; padding:44px 16px 74px; perspective:1700px; perspective-origin:50% 42%; }
.concept-label{ position:absolute; top:96px; left:50%; transform:translateX(-50%); text-align:center; pointer-events:none; z-index:2; width:90%; }
.concept-label .n{ font-size:11px; letter-spacing:4px; color:var(--b); font-weight:800; }
.concept-label .d{ font-size:11.5px; color:#8a93a6; letter-spacing:1px; margin-top:3px; }

/* ---------- ORTAK KART İSKELETİ ---------- */
.floater{ animation:float 6.5s ease-in-out infinite; will-change:transform; }
@keyframes float{ 0%,100%{ transform:translateY(-7px);} 50%{ transform:translateY(9px);} }
.card{ position:relative; transform-style:preserve-3d; cursor:pointer; user-select:none;
  transform:rotateX(var(--rx,0deg)) rotateY(var(--ry,0deg)); transition:transform .16s var(--ease); will-change:transform; }
.card__inner{ position:absolute; inset:0; transform-style:preserve-3d; transition:transform .95s var(--ease); will-change:transform; }
.card.is-flipped .card__inner{ transform:rotateY(180deg); }
.face{ position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; overflow:hidden; }
.face.back{ transform:rotateY(180deg); }
.card::after{ content:""; position:absolute; inset:-8%; z-index:-1; border-radius:44px;
  background:radial-gradient(58% 58% at 50% 45%,var(--a),transparent 70%); opacity:.28; filter:blur(34px); transition:opacity .4s var(--ease); }
.card:hover::after{ opacity:.46; }
.sweep{ position:absolute; inset:0; z-index:30; pointer-events:none; opacity:0;
  background:linear-gradient(115deg,transparent 34%,rgba(255,255,255,.5) 50%,transparent 66%); transform:translateX(-120%); mix-blend-mode:overlay; }
.card:hover .sweep{ animation:sweep 1.15s var(--ease); }
@keyframes sweep{ 0%{opacity:0;transform:translateX(-120%);} 30%{opacity:.85;} 100%{opacity:0;transform:translateX(120%);} }

/* GERÇEK-FOTO GÜVENLİ blok: img + otomatik scrim (her konsept kullanır) */
.ph{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:50% 14%; z-index:1; }
.scrim{ position:absolute; inset:0; z-index:2; pointer-events:none; }
/* varsayılan scrim: üst (yüz) berrak → alt koyu (yazı bölgesi) */
.scrim.std{ background:linear-gradient(180deg,rgba(0,0,0,0) 26%,rgba(0,0,0,.35) 52%,rgba(0,0,0,.82) 82%,rgba(0,0,0,.94) 100%); }
.scrim.top{ background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,0) 22%); } /* köşe çipleri okunur kalsın */

/* Okunur köşe çipi (foto üstünde OVR/logo/flag) */
.chip{ background:rgba(6,10,18,.42); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.16); border-radius:12px; }

/* Ortak küçük öğeler */
.holo{ border-radius:50%; background:conic-gradient(from 0deg,#ff2d55,#ffcc00,#34c759,#00c7ff,#af52de,#ff2d55);
  filter:saturate(1.4) brightness(1.1); box-shadow:0 0 10px rgba(255,255,255,.35),inset 0 0 8px rgba(255,255,255,.4); animation:holoSpin 6s linear infinite; }
.holo::after{ content:""; position:absolute; inset:24%; border-radius:50%; background:rgba(5,8,14,.85); }
@keyframes holoSpin{ to{ transform:rotate(360deg);} }
.qrbox{ background:#fff; border-radius:8px; padding:5px; } .qrbox canvas{ display:block; width:100%; height:100%; image-rendering:pixelated; }
.flag{ overflow:hidden; } .flag svg{ width:100%; height:100%; display:block; }
/* fitText hedefleri tek satır + taşma engeli */
.fit{ display:block; white-space:nowrap; overflow:hidden; }

/* =====================================================================
   CONCEPT 1 · GLASS — foto ayrı pencerede, yazılar AYRI cam panelde (çakışma yok)
   ===================================================================== */
.c1 .card{ width:330px; height:512px; }

.c1 .win .ph{ object-position:50% 16%; }

.c1 .c1-flag{ position:absolute; top:70px; right:30px; width:30px; height:22px; border-radius:5px; z-index:6; box-shadow:0 3px 8px rgba(0,0,0,.35); }
.c1 .c1-lower{ position:absolute; left:16px; right:16px; bottom:16px; z-index:5;
  background:rgba(255,255,255,.55); border:1px solid rgba(255,255,255,.85); border-radius:26px; padding:15px 16px 13px; backdrop-filter:blur(10px); }

.c1 .back .verify .qrbox{ width:50px; height:50px; } .c1 .back .verify .vt b{ font-size:11px; } .c1 .back .verify .vt span{ font-size:8.5px; color:#5a6b86; display:block; }
.c1 .back .verify .ok{ margin-left:auto; text-align:right; font-size:9.5px; font-weight:800; color:#1a9e57; }

   ===================================================================== */

function careerFor(p,i){
  const kaleci=p.pos==="KAL", fwd=/FOR|KAN|OOS/.test(p.pos), mid=p.pos==="ORT";
  const mac=110+i*11+(p.ovr-78)*4;

}

/* ---- STAT üret (6 temel) — oyuncudan türetilmiş, mevkiye göre ---- */
function statsFor(p){
  const k=p.pos==="KAL";
  const base=p.ovr;
  return [["HIZ",clamp(base-(k?18:2)+rand(p,1))],["ŞUT",clamp(k?24:base-3+rand(p,2))],["PAS",clamp(base-6+rand(p,3))],
          ["DRİ",clamp(k?22:base-2+rand(p,4))],["DEF",clamp(k?base-2: /STP/.test(p.pos)?base-1:42+rand(p,5))],["FİZ",clamp(base-4+rand(p,6))]];
}
function rand(p,s){ let x=(p.no*97+p.ovr*13+s*29)%17-8; return x; }
function clamp(v){ return Math.max(38,Math.min(99,Math.round(v))); }

/* ---- DURUM ---- */
let state={ c:1, r:'gold', p:0 };
const stage=document.getElementById('stage'), mount=document.getElementById('mount');

/* ---- QR ---- */
function drawQR(cv){ const ctx=cv.getContext('2d'); const N=21,px=cv.width/N; ctx.clearRect(0,0,cv.width,cv.height);
  let s=12457+state.p*131; const rnd=()=>{ s=(s*1103515245+12345)&0x7fffffff; return (s>>8)/0x7fffff; };
  ctx.fillStyle='#0a0a0a'; for(let y=0;y<N;y++)for(let x=0;x<N;x++){ if(rnd()>.55) ctx.fillRect(x*px,y*px,px,px); }
  const f=(ox,oy)=>{ ctx.fillStyle='#0a0a0a'; ctx.fillRect(ox*px,oy*px,7*px,7*px); ctx.fillStyle='#fff'; ctx.fillRect((ox+1)*px,(oy+1)*px,5*px,5*px); ctx.fillStyle='#0a0a0a'; ctx.fillRect((ox+2)*px,(oy+2)*px,3*px,3*px); };
  f(0,0); f(N-7,0); f(0,N-7); }

/* ---- fitText: uzun isim tek satıra otomatik küçülür (bozulmaz) ---- */
function fitText(root){
  root.querySelectorAll('.fit').forEach(el=>{
    el.style.fontSize=''; // CSS değerine dön
    const max=parseFloat(getComputedStyle(el).fontSize)||20; let size=max, guard=0;
    // clientWidth bounded (parent genişliği); tek satıra sığana kadar küçült
    while(el.scrollWidth>el.clientWidth+0.5 && size>10 && guard<80){ size-=0.5; el.style.fontSize=size+'px'; guard++; }
  });
}

/* ---- FLIP + TILT + PARALLAX ---- */
function bindCard(){
  const card=mount.querySelector('.card'); if(!card) return;
  let dx=0,dy=0,moved=false;
  card.addEventListener('pointerdown',e=>{ dx=e.clientX; dy=e.clientY; moved=false; });
  card.addEventListener('pointermove',e=>{ if(Math.abs(e.clientX-dx)>6||Math.abs(e.clientY-dy)>6) moved=true; });
  card.addEventListener('click',()=>{ if(!moved) card.classList.toggle('is-flipped'); });
  if(window.matchMedia('(pointer:fine)').matches){
    const depth=[...card.querySelectorAll('[data-depth]')]; let raf=null,tx=0,ty=0;
    const apply=()=>{ raf=null; const m=10;
      card.style.setProperty('--ry',(tx*m).toFixed(2)+'deg'); card.style.setProperty('--rx',(-ty*m).toFixed(2)+'deg');
      depth.forEach(el=>{ const d=parseFloat(el.dataset.depth)||0; el.style.transform=`translate3d(${(-tx*d).toFixed(1)}px,${(-ty*d).toFixed(1)}px,0)`; }); };
    card.addEventListener('pointermove',e=>{ const r=card.getBoundingClientRect(); tx=(e.clientX-r.left)/r.width-.5; ty=(e.clientY-r.top)/r.height-.5; if(!raf) raf=requestAnimationFrame(apply); });
    card.addEventListener('pointerleave',()=>{ card.style.setProperty('--ry','0deg'); card.style.setProperty('--rx','0deg'); depth.forEach(el=>el.style.transform='translate3d(0,0,0)'); });
  }
  card.querySelectorAll('canvas.qr').forEach(drawQR);
}

/* ---- THEME ENGINE uygula ---- */
function applyRarity(){ const R=RARITY[state.r]; const root=document.documentElement;
  root.style.setProperty('--a',R.a); root.style.setProperty('--b',R.b); root.style.setProperty('--g',R.g); }

/* ---- MOUNT ---- */
function build(){
  const R=RARITY[state.r]; const P=Object.assign({}, PLAYERS[state.p]);
  P.stats=statsFor(P);
  const ph=portrait(P), car=careerFor(P,state.p);
  mount.innerHTML=CONCEPTS[state.c].render(P,R,ph,car);
  document.getElementById('cN').textContent=CONCEPTS[state.c].n;
  document.getElementById('cD').textContent=CONCEPTS[state.c].d;
  bindCard();
  // foto yüklenince + hemen: isimleri sığdır
  requestAnimationFrame(()=>fitText(mount));
  setTimeout(()=>fitText(mount),60);
}

/* ---- OLAYLAR ---- */
document.getElementById('tabs').addEventListener('click',e=>{ const b=e.target.closest('.tab'); if(!b) return;
  state.c=+b.dataset.c; document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t===b)); build(); });
document.getElementById('rar').addEventListener('change',e=>{ state.r=e.target.value; applyRarity(); build(); });
const plySel=document.getElementById('ply');
PLAYERS.forEach((p,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=`${p.ad} · ${p.pos} · ${p.ovr}`; plySel.appendChild(o); });
plySel.addEventListener('change',e=>{ state.p=+e.target.value; build(); });
document.getElementById('prev').addEventListener('click',()=>{ state.p=(state.p-1+PLAYERS.length)%PLAYERS.length; plySel.value=state.p; build(); });
document.getElementById('next').addEventListener('click',()=>{ state.p=(state.p+1)%PLAYERS.length; plySel.value=state.p; build(); });
window.addEventListener('resize',()=>fitText(mount));

/* ---- BAŞLAT ---- */
applyRarity(); build();
</script>

<!-- Service worker: kabuk önbelleği + "yeni sürüm hazır" bildirimi -->
<script>
  (function(){
    if(!("serviceWorker" in navigator)) return;
    if(location.protocol !== "https:" && location.hostname !== "localhost") return;
    function toastGoster(reg){
      if(document.getElementById("fl-guncel-toast")) return;
      var t = document.createElement("div");
      t.id = "fl-guncel-toast";
      t.style.cssText = "position:fixed;left:50%;transform:translateX(-50%);bottom:calc(84px + env(safe-area-inset-bottom));z-index:99999;background:#0F1728;color:#F1F5F9;border:1px solid #39FF7A55;border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px;font:600 13px Inter,sans-serif;box-shadow:0 8px 30px rgba(0,0,0,.5);max-width:92vw";
      t.innerHTML = '<span>✨ Yeni sürüm hazır</span>';
      var b = document.createElement("button");
      b.textContent = "Yenile";
      b.style.cssText = "background:#39FF7A;color:#06240F;border:none;border-radius:10px;padding:9px 16px;font:700 13px Inter,sans-serif;cursor:pointer;min-height:36px";
      b.onclick = function(){
        b.textContent = "…";
        if(reg.waiting) reg.waiting.postMessage("FL_SKIP_WAITING");
        setTimeout(function(){ location.reload(); }, 400);
      };
      t.appendChild(b);
      document.body.appendChild(t);
    }
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("/sw.js").then(function(reg){
        // Sayfa açıkken yeni sürüm bulunursa kullanıcıya sor
        if(reg.waiting) toastGoster(reg);
        reg.addEventListener("updatefound", function(){
          var yeni = reg.installing;
          if(!yeni) return;
          yeni.addEventListener("statechange", function(){
            if(yeni.state === "installed" && navigator.serviceWorker.controller) toastGoster(reg);
          });
        });
        // Uygulama her öne geldiğinde güncelleme kontrol et (PWA'da sekme hiç kapanmaz)
        document.addEventListener("visibilitychange", function(){
          if(document.visibilityState === "visible") reg.update().catch(function(){});
        });
      }).catch(function(){});
      // Yeni SW devraldığında sayfayı tazele (Yenile'ye basıldıysa)
      var yenilendi = false;
      navigator.serviceWorker.addEventListener("controllerchange", function(){
        if(yenilendi) return; yenilendi = true;
      });
    });
  })();
</script>
